<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teamwork4Freedom Wealth Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:16px;line-height:1.6;background:#f4f6f9;color:#333;padding:1rem;max-width:800px;margin:0 auto}
h1{text-align:center;color:#0d47a1;font-size:2rem;margin-bottom:.5rem}
.sub{text-align:center;color:#666;font-size:1rem;margin-bottom:1.5rem}
label{display:block;margin-top:1rem;font-weight:bold;color:#2c3e50}
input,select{width:100%;padding:.8rem;font-size:1rem;margin-top:.3rem;border:2px solid #0d47a1;border-radius:8px;background:#fff}
.hb{width:100%;padding:1rem;font-size:1.1rem;font-weight:bold;cursor:pointer;border:none;border-radius:10px;margin-top:1.5rem;display:flex;align-items:center;justify-content:space-between;color:#fff}
.hc{background:linear-gradient(135deg,#1565c0,#42a5f5)}
.hd{background:linear-gradient(135deg,#f9a825,#ffca28);color:#333}
.he{background:linear-gradient(135deg,#2e7d32,#66bb6a)}
.cs{max-height:0;overflow:hidden;transition:max-height .4s;background:#fff;border-radius:8px;padding:0 1rem;margin-top:0;border:1px solid #ddd}
.cs.op{max-height:2000px;padding:1rem;margin-top:1rem}
.rb{margin-top:2rem;padding:2rem;background:#fff;border:3px solid #0d47a1;border-radius:12px;text-align:center}
.mg{font-size:2.5rem;font-weight:900;color:#2e7d32}
.eo{display:none;gap:1rem;margin-top:1rem}
.eo.op{display:flex}
.eb{flex:1;padding:.8rem;font-size:1rem;border:none;border-radius:6px;cursor:pointer;font-weight:bold;color:#fff}
.bp{background:#555}
.dn{font-size:.85rem;color:#666;margin-top:.5rem}
</style>
</head>
<body>
<h1>Teamwork4Freedom Wealth Calculator</h1>
<div class="sub">Exponential Growth & Cash Flow Projection</div>

<label>1️⃣ Starting Amount (USD)</label>
<input type="number" id="sa" value="1000">

<label>2️⃣ Start Date</label>
<input type="date" id="sd">

<label>3️⃣ End Date</label>
<input type="date" id="ed">

<label>4️⃣ Trades Per Day</label>
<input type="number" id="tpd" value="2" min="1">

<label>5️⃣ Profit Rate Per Trade (%)</label>
<select id="pr"></select>

<button class="hb hc" onclick="tg('cfs',this)"><span>💵 External Cash Flow</span><span>▼</span></button>
<div id="cfs" class="cs">
<h3>Contributions</h3>
<label>One-Time Contribution (Amount)</label>
<input type="number" id="otca" placeholder="0">
<label>One-Time Contribution (Date)</label>
<input type="date" id="otcd">
<label>Recurring Contribution (Amount)</label>
<input type="number" id="rca" placeholder="0">
<label>Recurring Interval (Days)</label>
<input type="number" id="rci" placeholder="30" min="1">
<h3 style="margin-top:1rem;color:#d32f2f">Withdrawals</h3>
<label>One-Time Withdrawal (Amount)</label>
<input type="number" id="otwa" placeholder="0">
<label>One-Time Withdrawal (Date)</label>
<input type="date" id="otwd">
<label>Recurring Withdrawal (Amount)</label>
<input type="number" id="rwa" placeholder="0">
<label>Recurring Interval (Days)</label>
<input type="number" id="rwi" placeholder="30" min="1">
</div>

<button class="hb hd" onclick="tg('ds',this)"><span>📈 Dividend Levels</span><span>▼</span></button>
<div id="ds" class="cs">
<label>Select Dividend Level</label>
<select id="dl">
<option value="0">None (No Dividend)</option>
<option value="1">Level 1 — $30/installment ($90/mo)</option>
<option value="2">Level 2 — $150/installment ($450/mo)</option>
<option value="3">Level 3 — $500/installment ($1,500/mo)</option>
<option value="4">Level 4 — $1,200/installment ($3,600/mo)</option>
<option value="5">Level 5 — $2,400/installment ($7,200/mo)</option>
<option value="6">Level 6 — $5,000/installment ($15,000/mo)</option>
<option value="7">Level 7 — $10,000/installment ($30,000/mo)</option>
<option value="8">Level 8 — $20,000/installment ($60,000/mo)</option>
<option value="9">Level 9 — $33,333/installment ($100,000/mo)</option>
<option value="10">Level 10 — $100,000/installment ($300,000/mo)</option>
<option value="11">Level 11 — $200,000/installment ($600,000/mo)</option>
<option value="12">Level 12 — $333,333/installment ($1,000,000/mo)</option>
</select>
<p class="dn">* Paid on 9th, 19th, 29th. Levels 1-7: per installment. Levels 8-12: monthly total ÷ 3.</p>
</div>

<button class="hb" style="background:linear-gradient(135deg,#0d47a1,#1976d2)" onclick="calc()">🚀 Calculate Total</button>

<div class="rb">
<div>Total Projected Value:</div>
<div id="rd" class="mg">$0.00</div>
</div>

<button class="hb he" onclick="tg('es',this)"><span>📤 Export Results</span><span>▼</span></button>
<div id="es" class="eo">
<button class="eb bp" onclick="window.print()">🖨️ Print / Save PDF</button>
</div>

<script>
document.addEventListener('DOMContentLoaded',function(){
var t=new Date().toISOString().split('T')[0];
var n=new Date();n.setFullYear(n.getFullYear()+1);
document.getElementById('sd').value=t;
document.getElementById('ed').value=n.toISOString().split('T')[0];
var rs=document.getElementById('pr');
for(var r=60.0;r<=65.05;r+=0.1){
var o=document.createElement('option');
o.value=r.toFixed(1);o.textContent=r.toFixed(1)+'%';
if(Math.abs(r-62.0)<0.05)o.selected=true;
rs.appendChild(o);
}});

function tg(id,btn){
var s=document.getElementById(id);var io=s.classList.contains('op');
document.querySelectorAll('.cs').forEach(function(x){x.classList.remove('op');});
document.querySelectorAll('.hb').forEach(function(b){b.classList.remove('op');});
if(!io){s.classList.add('op');btn.classList.add('op');}
}

function gIA(lv){
var mt={0:0,1:90,2:450,3:1500,4:3600,5:7200,6:15000,7:30000,8:60000,9:100000,10:300000,11:600000,12:1000000};
return(mt[lv]||0)/3;
}

function calc(){
var P0=parseFloat(document.getElementById('sa').value)||0;
var ss=document.getElementById('sd').value;
var es=document.getElementById('ed').value;
var tpd=parseInt(document.getElementById('tpd').value)||1;
var pr=parseFloat(document.getElementById('pr').value)||62.0;
var otca=parseFloat(document.getElementById('otca').value)||0;
var otcd=document.getElementById('otcd').value;
var rca=parseFloat(document.getElementById('rca').value)||0;
var rci=parseInt(document.getElementById('rci').value)||0;
var otwa=parseFloat(document.getElementById('otwa').value)||0;
var otwd=document.getElementById('otwd').value;
var rwa=parseFloat(document.getElementById('rwa').value)||0;
var rwi=parseInt(document.getElementById('rwi').value)||0;
var dl=parseInt(document.getElementById('dl').value)||0;
if(!ss||!es){alert('Please select start and end dates.');return;}
var st=new Date(ss);var en=new Date(es);
if(en<st){alert('End date must be after start date.');return;}
var ppt=0.01*(pr/100);
var tm=1+ppt;
var dm=Math.pow(tm,tpd);
var inst=gIA(dl);
var bal=P0;var od=24*60*60*1000;var ds=0;
for(var d=new Date(st);d<=en;d=new Date(d.getTime()+od)){
var dom=d.getDate();
if(dom===9||dom===19||dom===29){bal+=inst;}
if(otcd&&d.toISOString().split('T')[0]===otcd){bal+=otca;}
if(rci>0&&ds>0&&ds%rci===0){bal+=rca;}
if(otwd&&d.toISOString().split('T')[0]===otwd){bal-=otwa;}
if(rwi>0&&ds>0&&ds%rwi===0){bal-=rwa;}
bal*=dm;
ds++;
}
var fm=bal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
document.getElementById('rd').textContent='$'+fm;
}
</script>
</body>
</html>
